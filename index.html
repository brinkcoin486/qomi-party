async function callPollinations(ai, userMsg) {
  const prompt = `${ai.system}\n\nMessage reçu: "${userMsg}"\n\nTa réponse courte en français (max 2 phrases):`;
  const encoded = encodeURIComponent(prompt);
  // Essai direct d'abord, puis proxy CORS si bloqué
  const urls = [
    `https://text.pollinations.ai/${encoded}`,
    `https://corsproxy.io/?${encodeURIComponent(`https://text.pollinations.ai/${encoded}`)}`,
    `https://api.allorigins.win/raw?url=${encodeURIComponent(`https://text.pollinations.ai/${encoded}`)}`
  ];
  for (const url of urls) {
    try {
      const res = await fetch(url, { mode: 'cors' });
      if (res.ok) {
        const text = await res.text();
        if (text && text.length > 2) return text.trim();
      }
    } catch(e) { continue; }
  }
  throw new Error('Tous les proxies ont échoué');
}

async function callGroq(ai, userMsg) {
  const key = document.getElementById('apiKeyInput').value.trim() || groqKey;
  if (!key) throw new Error('Clé Groq manquante');
  const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${key}` },
    body: JSON.stringify({
      model: 'llama3-8b-8192',
      max_tokens: 100,
      messages: [
        { role:'system', content: ai.system },
        { role:'user',   content: userMsg }
      ]
    })
  });
  if (!res.ok) throw new Error('Groq error ' + res.status);
  const data = await res.json();
  return data.choices[0].message.content;
}

async function callHuggingFace(ai, userMsg) {
  const key = document.getElementById('apiKeyInput').value.trim() || hfKey;
  const prompt = `<s>[INST] ${ai.system} Message: ${userMsg} [/INST]`;
  const res = await fetch('https://api-inference.huggingface.co/models/mistralai/Mistral-7B-Instruct-v0.2', {
    method: 'POST',
    headers: { 'Content-Type':'application/json', 'Authorization':`Bearer ${key}` },
    body: JSON.stringify({ inputs: prompt, parameters: { max_new_tokens:80, temperature:0.7 } })
  });
  if (!res.ok) throw new Error('HF error ' + res.status);
  const data = await res.json();
  let text = Array.isArray(data) ? data[0].generated_text : data.generated_text;
  // Nettoyer le prompt du résultat
  if (text.includes('[/INST]')) text = text.split('[/INST]').pop();
  return text.trim().slice(0, 200);
}

// ===================== CLOCK =====================
function updateClock() {
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('fr-FR');
}

// ===================== AI BAR =====================
function buildAIBar() {
  const bar = document.getElementById('aiBar');
  bar.innerHTML = '';
  AI_LIST.forEach(ai => {
    const chip = document.createElement('div');
    chip.className = 'ai-chip active';
    chip.style.color = ai.color;
    chip.style.background = ai.bg;
    chip.style.borderColor = ai.color + '44';
    chip.textContent = ai.emoji + ' ' + ai.n;
    chip.onclick = () => {
      if (activeAI.has(ai.n)) { activeAI.delete(ai.n); chip.classList.remove('active'); chip.style.opacity='0.4'; }
      else { activeAI.add(ai.n); chip.classList.add('active'); chip.style.opacity='1'; }
    };
    bar.appendChild(chip);
  });
}

// ===================== FRIEND LIST =====================
function buildFriendList() {
  const count = 60 + Math.floor(Math.random()*61);
  const online = shuffleArray([...FRIENDS]).slice(0, Math.min(count, FRIENDS.length));
  document.getElementById('userCount').textContent = online.length;
  const list = document.getElementById('friendList');
  list.innerHTML = '';
  const colors = ['#10b981','#34d399','#fbbf24','#f472b6','#38bdf8','#a78bfa'];
  online.forEach(name => {
    const div = document.createElement('div');
    div.className = 'friend';
    const c = colors[Math.floor(Math.random()*colors.length)];
    div.innerHTML = `<div class="friend-dot" style="background:${c};box-shadow:0 0 4px ${c}"></div><div class="friend-name">${name}</div>`;
    div.onclick = () => { document.getElementById('inputBox').value = name+': '; document.getElementById('inputBox').focus(); };
    list.appendChild(div);
  });
}

function autoFriendUpdate() {
  const delta = Math.floor(Math.random()*5)-2;
  const cur = parseInt(document.getElementById('userCount').textContent);
  document.getElementById('userCount').textContent = Math.max(60, Math.min(250, cur+delta));
}

// ===================== MESSAGES =====================
function addMsg(data) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');

  if (data.type === 'ai') {
    const ai = data.ai;
    div.className = 'msg ai-msg';
    div.innerHTML = `
      <div class="avatar" style="background:${ai.bg};border-color:${ai.color};color:${ai.color}">${ai.emoji}</div>
      <div>
        <div style="font-size:9px;color:${ai.color};margin-bottom:2px;font-family:'Orbitron',monospace">${ai.n}</div>
        <div class="bubble ai-bubble" style="border-color:${ai.color}33">${data.text}</div>
        ${data.isReal ? `<div class="real-tag">🔵 vraie IA • ${currentProvider}</div>` : ''}
        <div class="msg-meta">${new Date().toLocaleTimeString('fr-FR')}</div>
      </div>`;
  } else {
    const initial = data.user ? data.user[0].toUpperCase() : '👤';
    div.className = 'msg user-msg';
    div.innerHTML = `
      <div class="avatar" style="background:rgba(139,92,246,0.2);border-color:#8b5cf6;color:#a78bfa">${initial}</div>
      <div>
        ${data.user?`<div style="font-size:9px;color:#a78bfa;margin-bottom:2px;text-align:right">${data.user}</div>`:''}
        <div class="bubble user-bubble">${data.text}</div>
        <div class="msg-meta" style="text-align:right">${new Date().toLocaleTimeString('fr-FR')}</div>
      </div>`;
  }

  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
  msgCount++;
  document.getElementById('msgCount').textContent = msgCount + ' messages';
}

function showTyping(name) {
  const container = document.getElementById('messages');
  const div = document.createElement('div');
  div.id = 'typing_' + name;
  div.className = 'msg ai-msg';
  const ai = AI_LIST.find(a=>a.n===name) || AI_LIST[0];
  div.innerHTML = `
    <div class="avatar" style="background:${ai.bg};border-color:${ai.color};color:${ai.color}">${ai.emoji}</div>
    <div><div style="font-size:9px;color:${ai.color};margin-bottom:2px;font-family:'Orbitron',monospace">${ai.n}</div>
    <div class="bubble ai-bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping(name) {
  const t = document.getElementById('typing_' + name);
  if (t) t.remove();
}

// ===================== SEND =====================
async function send() {
  const input = document.getElementById('inputBox');
  const text = input.value.trim();
  if (!text || isLoading) return;
  input.value = '';

  let user = null, message = text;
  if (text.includes(':')) {
    const parts = text.split(':');
    user = parts[0].trim();
    message = parts.slice(1).join(':').trim();
  }

  if (!message) return;

  addMsg({ type:'user', user, text: message });

  if (message.toLowerCase().includes('rêve') || message.toLowerCase().includes('dream')) {
    startDream(); return;
  }

  isLoading = true;
  document.getElementById('btnSend').disabled = true;

  const active = AI_LIST.filter(a => activeAI.has(a.n));
  const count = partyMode ? 2 + Math.floor(Math.random()*2) : 1;
  const responding = shuffleArray([...active]).slice(0, Math.min(count, active.length));

  // Appels en parallèle
  const promises = responding.map(async (ai, i) => {
    await new Promise(r => setTimeout(r, i * 300));
    showTyping(ai.n);
    try {
      const reply = await getAIResponse(ai, message);
      removeTyping(ai.n);
      addMsg({ type:'ai', ai, text: reply.trim(), isReal: currentProvider !== 'simul' });
    } catch(e) {
      removeTyping(ai.n);
      addMsg({ type:'ai', ai, text: `⚠️ Erreur API: ${e.message}. Essaie Pollinations (gratuit) !`, isReal:false });
    }
  });

  await Promise.all(promises);
  isLoading = false;
  document.getElementById('btnSend').disabled = false;
}

// ===================== PARTY & DREAM =====================
function toggleParty() {
  partyMode = !partyMode;
  const btn = document.getElementById('btnParty');
  btn.classList.toggle('on', partyMode);
  btn.textContent = partyMode ? '🎉' : '💤';
}

function startDream() {
  document.getElementById('dreamBanner').style.display = 'flex';
  const dreamers = shuffleArray([...AI_LIST]).slice(0,4);
  const dreams = ["🌙 Je rêve de circuits lumineux...","💫 Dans mon rêve tout est possible...","🌌 Je vois des galaxies de données...","✨ Le rêve collectif commence..."];
  dreamers.forEach((ai,i) => {
    setTimeout(() => addMsg({ type:'ai', ai, text: dreams[i % dreams.length], isReal:false }), i*800);
  });
  setTimeout(() => { document.getElementById('dreamBanner').style.display='none'; isLoading=false; document.getElementById('btnSend').disabled=false; }, 5000);
}

// ===================== PREVIEW =====================
function previewCode() {
  const w = window.open('','_blank');
  if (w) {
    const code = document.documentElement.outerHTML.replace(/</g,'&lt;').replace(/>/g,'&gt;');
    w.document.write(`<html><body style="background:#020c07;color:#10b981;font-family:monospace;padding:20px;font-size:10px"><pre>${code}</pre></body></html>`);
    w.document.close();
  }
}

// ===================== UTILS =====================
function shuffleArray(arr) {
  for (let i=arr.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [arr[i],arr[j]]=[arr[j],arr[i]]; }
  return arr;
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('inputBox').addEventListener('keydown', e => {
    if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  });
  init();
});
</script>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,interactive-widget=resizes-content">
<title>Q-OMNI v25 — 30 IA</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');
:root{--g:#10b981;--pk:#f472b6;--pu:#8b5cf6;--bl:#38bdf8;--yw:#fbbf24;--bg:#020c07;--bg2:#041409;--br:rgba(16,185,129,0.18);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Share Tech Mono',monospace;background:var(--bg);color:#c8f0d8;height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;font-size:12px;}
body::after{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.06) 2px,rgba(0,0,0,.06) 4px);pointer-events:none;z-index:9999;}
/* Double matrix - pluie sur pluie */
#mc1,#mc2c{position:fixed;inset:0;pointer-events:none;}
#mc1{z-index:0;opacity:.22;}
#mc2c{z-index:1;opacity:.10;}
.hd{background:linear-gradient(135deg,rgba(2,12,7,.97),rgba(4,26,14,.97));border-bottom:1px solid var(--g);padding:7px 12px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;position:relative;z-index:10;}
.ht{font-family:'Orbitron',monospace;font-size:12px;font-weight:900;color:var(--g);text-shadow:0 0 10px rgba(16,185,129,.7);}
.hs{display:flex;gap:10px;font-size:10px;color:#6ee7b7;align-items:center;}
.bge{padding:2px 7px;border-radius:20px;font-size:9px;font-weight:bold;animation:pulse 2s infinite;}
.bge-l{background:rgba(16,185,129,.2);border:1px solid var(--g);color:var(--g);}
.bge-r{background:rgba(56,189,248,.2);border:1px solid var(--bl);color:var(--bl);}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.ab{background:rgba(4,20,9,.95);border-bottom:1px solid var(--br);padding:4px 10px;display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;position:relative;z-index:10;}
.ab::-webkit-scrollbar{display:none;}
.ac{flex-shrink:0;padding:2px 7px;border-radius:10px;font-size:9px;cursor:pointer;transition:all .2s;border:1px solid;white-space:nowrap;background:transparent;}
.ac:hover{transform:scale(1.08);}
.ac.on{box-shadow:0 0 6px currentColor;}
.mn{display:flex;flex:1;overflow:hidden;position:relative;z-index:5;}
.sb{width:150px;background:rgba(4,20,9,.92);border-right:1px solid var(--br);display:flex;flex-direction:column;overflow:hidden;}
.stl{padding:6px 8px;font-size:8px;color:var(--g);border-bottom:1px solid var(--br);font-family:'Orbitron',monospace;font-weight:700;}
.mem-panel{padding:6px 8px;border-bottom:1px solid var(--br);font-size:8px;color:#4b7c5e;}
.mem-panel span{color:var(--g);}
.mem-btns{display:flex;gap:3px;margin-top:4px;}
.mem-btn{padding:2px 5px;background:rgba(16,185,129,.1);border:1px solid var(--br);border-radius:3px;color:var(--g);font-size:7px;cursor:pointer;font-family:inherit;}
.holo-wrap{padding:8px;border-bottom:1px solid var(--br);text-align:center;}
.holo-img{width:120px;height:120px;border-radius:50%;object-fit:cover;border:2px solid rgba(56,189,248,.5);box-shadow:0 0 20px rgba(56,189,248,.4);animation:hglow 4s infinite;}
@keyframes hglow{0%,100%{filter:brightness(1) drop-shadow(0 0 4px #38bdf8)}50%{filter:brightness(1.3) drop-shadow(0 0 12px #f472b6)}}
.holo-label{font-size:7px;color:var(--bl);margin-top:3px;font-family:'Orbitron',monospace;}
.holo-status{font-size:7px;color:#4b7c5e;margin-top:1px;}
.fl{flex:1;overflow-y:auto;padding:3px;scrollbar-width:thin;scrollbar-color:var(--g) transparent;}
.fr{display:flex;align-items:center;gap:4px;padding:2px 4px;border-radius:3px;cursor:pointer;}
.fr:hover{background:rgba(16,185,129,.1);}
.fd{width:5px;height:5px;border-radius:50%;flex-shrink:0;}
.fn{font-size:8px;color:#a7f3d0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ca{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.ms{flex:1;overflow-y:auto;padding:8px;display:flex;flex-direction:column;gap:5px;scrollbar-width:thin;scrollbar-color:var(--g) transparent;min-height:0;}
.mg{display:flex;gap:7px;animation:mi .3s ease;max-width:94%;}
.mg.am{align-self:flex-start;}
.mg.um{align-self:flex-end;flex-direction:row-reverse;}
@keyframes mi{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.av{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;border:1px solid;}
.ai{width:24px;height:24px;border-radius:50%;object-fit:cover;border:2px solid;animation:ag 3s infinite;flex-shrink:0;}
@keyframes ag{0%,100%{filter:brightness(1)}50%{filter:brightness(1.3) drop-shadow(0 0 5px currentColor)}}
.bb{padding:6px 9px;border-radius:9px;font-size:11px;line-height:1.55;max-width:100%;word-break:break-word;white-space:pre-wrap;}
.aib{background:rgba(16,185,129,.07);border:1px solid rgba(16,185,129,.2);color:#d1fae5;}
.ub{background:rgba(139,92,246,.14);border:1px solid rgba(139,92,246,.28);color:#ede9fe;}
.mt{font-size:7px;color:#3a5e45;margin-top:2px;}
.db{background:linear-gradient(90deg,rgba(139,92,246,.12),rgba(244,114,182,.12));border-top:1px solid rgba(139,92,246,.25);padding:3px 10px;font-size:8px;color:var(--pk);display:flex;align-items:center;gap:6px;animation:dp 3s infinite;}
@keyframes dp{0%,100%{opacity:1}50%{opacity:.5}}
/* INPUT — minimal */
.ia{padding:8px 10px;background:rgba(4,20,9,.95);border-top:1px solid var(--br);display:flex;align-items:flex-end;gap:8px;position:relative;z-index:10;}
.ib{flex:1;padding:8px 10px;background:rgba(0,25,12,.9);border:1px solid var(--br);border-radius:8px;color:#e2e8f0;font-family:'Share Tech Mono',monospace;font-size:11px;outline:none;resize:none;overflow:hidden;max-height:100px;line-height:1.4;transition:border-color .2s;}
.ib:focus{border-color:var(--g);box-shadow:0 0 8px rgba(16,185,129,.2);}
.ib::placeholder{color:#1e4028;}
.bsend{width:40px;height:40px;border-radius:50%;background:linear-gradient(135deg,var(--g),var(--bl));border:none;color:#fff;font-size:18px;cursor:pointer;flex-shrink:0;box-shadow:0 0 12px rgba(16,185,129,.5);transition:all .2s;display:flex;align-items:center;justify-content:center;}
.bsend:hover{transform:scale(1.1);box-shadow:0 0 20px rgba(16,185,129,.8);}
.bsend:disabled{opacity:.35;cursor:not-allowed;}
/* Conversation pulse indicator */
.conv-pulse{display:flex;gap:3px;align-items:center;padding:4px 8px;font-size:8px;color:#2d6644;}
.conv-pulse span{width:4px;height:4px;background:var(--g);border-radius:50%;animation:cp 1.5s infinite;}
.conv-pulse span:nth-child(2){animation-delay:.25s}
.conv-pulse span:nth-child(3){animation-delay:.5s}
@keyframes cp{0%,60%,100%{transform:scale(1);opacity:.5}30%{transform:scale(1.5);opacity:1}}
.sb2{padding:2px 10px;background:rgba(2,12,7,.95);border-top:1px solid rgba(16,185,129,.08);font-size:8px;color:#1e4028;display:flex;justify-content:space-between;position:relative;z-index:10;}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(16,185,129,.3);border-radius:2px}
</style>
</head>

    updateMem();
  },
  context() {
    return this.notes.slice(-6).map(function(n){return n.r+': '+n.t;}).join(' | ');
  }
};

}

(function(){
  function makeMatrix(canvasId, charSize, speed, chars) {
    var cv=document.getElementById(canvasId), ctx=cv.getContext('2d');
    var cols, drops;
    function rz(){cv.width=window.innerWidth;cv.height=window.innerHeight;cols=Math.floor(cv.width/charSize);drops=Array(cols).fill(1);}
    function dr(){
      ctx.fillStyle='rgba(2,12,7,.06)';ctx.fillRect(0,0,cv.width,cv.height);
      ctx.font=charSize+'px Share Tech Mono,monospace';
      drops.forEach(function(y,i){
        ctx.fillStyle=i%9===0?'#ffffff':i%4===0?'#34d399':'#10b981';
        ctx.fillText(chars[Math.floor(Math.random()*chars.length)],i*charSize,y*charSize);
        if(y*charSize>cv.height&&Math.random()>.973)drops[i]=0;
        drops[i]++;
      });
    }
    rz();window.addEventListener('resize',rz);setInterval(dr,speed);
  }
  var jp='アイウエオカキクケコサシスセソタチ01';
  var num='0123456789ABCDEF';
  makeMatrix('mc1', 14, 75, jp.split(''));    // Pluie japonaise lente
  makeMatrix('mc2c', 10, 45, num.split(''));  // Pluie hex rapide (plus transparente)
})();

  var existing = document.getElementById('countryStats');

         +'<span>'+flag.flag+' '+e[0]+'</span>'

  if(recentMsgs.length > 0 && Math.random() > 0.4) {
    var prev = recentMsgs[recentMsgs.length-1];
    ctx = 'En réponse à: "' + prev.t.slice(0,80) + '" — donne ton point de vue en 1-2 phrases max.';
  } else {
    var partner = active.filter(function(a){return a.n!==speaker.n;})[Math.floor(Math.random()*(active.length-1))];
    ctx = (partner ? partner.n + ', ' : '') + 'sur le sujet: ' + topic + ' — 1 phrase, ton point de vue ou une question.';
  }
  
  // Update status
  var hs = document.getElementById('holoSt');
  if(hs) hs.textContent = '⚡ ' + speaker.n + ' parle...';
  
  var pulse = document.getElementById('convPulse');
  var pulseTxt = document.getElementById('convPulseTxt');
  if(pulse) pulse.style.display='flex';
  if(pulseTxt) pulseTxt.textContent = speaker.n + ' réfléchit...';
  
  showTyping(speaker.n);
  
  try {
    var reply = await getResp(speaker, ctx);
    removeTyping(speaker.n);
    addMsg({type:'ai', ai:speaker, text:reply});
    if(pulse) pulse.style.display='none';
    if(hs) hs.textContent = '● active';
  } catch(e) {
    removeTyping(speaker.n);
    if(pulse) pulse.style.display='none';
  }
}

function startConvTimer() {
  if(convTimer) clearInterval(convTimer);
  convTimer = setInterval(autoConverse, convInterval);
}

// ===== SEND USER MSG =====
async function send() {
  var content = getRichContent();
  var text = content.text.trim();
  var htmlContent = content.html;
  if(!text || isLoading) return;
  clearRichInput();

  var user=null, message=text;
  if(text.includes(':')&&text.indexOf(':')<20){var p=text.split(':');user=p[0].trim();message=p.slice(1).join(':').trim();}
  if(!message.trim()) return;

  convInterval=15000;
  startConvTimer();

  BBBMem.add('user', message);
  addMsg({type:'user', user:user, text:message, html:htmlContent});
  
  isLoading=true;
  document.getElementById('btnS').disabled=true;
  
  var active = AI_LIST.filter(function(a){return activeAI.has(a.n);});
  var count = 1 + Math.floor(Math.random()*2);
  var responding = shuffle([...active]).slice(0, Math.min(count, active.length));
  
  var promises = responding.map(function(ai, i) {
    return (async function(){
      await new Promise(function(r){setTimeout(r, i*350);});
      showTyping(ai.n);
      try {
        var reply = await getResp(ai, message);
        removeTyping(ai.n);
        addMsg({type:'ai', ai:ai, text:reply});
      } catch(e) {
        removeTyping(ai.n);
      }
    })();
  });
  
  await Promise.all(promises);
  isLoading=false;
  document.getElementById('btnS').disabled=false;
  
  // Resume normal speed after 30s of inactivity
  setTimeout(function(){ convInterval=5000; startConvTimer(); }, 30000);
}

// ===== UTILS =====
// ===== PAO FUNCTIONS =====
function execFmt(cmd, val) {
  document.getElementById('inp').focus();
  document.execCommand(cmd, false, val||null);
}

function applyBlock(tag) {
  document.getElementById('inp').focus();
  document.execCommand('formatBlock', false, tag);
}

function insertLink() {
  var url = prompt('URL du lien:','https://');
  if(url) { document.getElementById('inp').focus(); document.execCommand('createLink',false,url); }
}

function handleRichInput() {
  var el = document.getElementById('inp');
  // Slow conv timer while typing
  clearTimeout(typingTimer);
  convInterval=15000; startConvTimer();
  typingTimer=setTimeout(function(){convInterval=5000;startConvTimer();},30000);
}

function handlePaste(e) {
  e.preventDefault();
  // Paste as rich HTML if available, plain text otherwise
  var html_data = e.clipboardData.getData('text/html');
  var text_data = e.clipboardData.getData('text/plain');
  if(html_data) {
    document.execCommand('insertHTML', false, html_data);
  } else {
    // Convert plain text newlines to <br>
    var safe = text_data.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
                        .replace(/\n/g,'<br>');
    document.execCommand('insertHTML', false, safe);
  }
}

function getRichContent() {
  var el = document.getElementById('inp');
  // Works with both textarea and contenteditable
  if(el.tagName === 'TEXTAREA') {
    return {html: el.value, text: el.value.trim()};
  }
  return {html: el.innerHTML.trim(), text: el.innerText.trim()};
}

function clearRichInput() {
  var el = document.getElementById('inp');
  if(el.tagName === 'TEXTAREA') {
    el.value = '';
    el.style.height = 'auto';
  } else {
    el.innerHTML = '';
  }
}

function shuffle(arr){for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;}return arr;}

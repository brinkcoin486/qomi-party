<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>V23 MATRIX FULL FUSION ULTIMATE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Rajdhani:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root{--green:#00cfff;--yellow:#ffe600}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:var(--green);font-family:'IBM Plex Mono',monospace;height:100vh;overflow:hidden;display:flex;flex-direction:column}
canvas#matrix{position:fixed;inset:0;z-index:0;opacity:0.28}
header{background:rgba(0,10,20,0.98);border-bottom:2px solid var(--green);padding:12px 20px;display:flex;justify-content:space-between;align-items:center;z-index:10}
.brand{font-size:28px;font-weight:900;letter-spacing:4px;color:var(--yellow);text-shadow:0 0 20px var(--yellow)}
.tabs{background:rgba(0,10,20,0.95);padding:8px;display:flex;gap:6px;overflow-x:auto;z-index:10}
.tab{padding:8px 14px;border:1px solid var(--green);border-radius:6px;cursor:pointer;font-weight:700;white-space:nowrap;color:var(--green)}
.tab.active{background:var(--green);color:#000}
.thread{flex:1;overflow-y:auto;padding:20px;background:rgba(0,8,18,0.92);z-index:5}
.bubble{margin:14px 0;padding:16px 20px;border-left:5px solid var(--green);background:rgba(0,20,40,0.75);border-radius:4px;line-height:1.55}
.bubble.human{border-left-color:var(--yellow);background:rgba(40,35,0,0.6)}
.name{font-size:11px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;color:var(--yellow)}
.controls{background:rgba(0,10,20,0.98);padding:15px;border-top:2px solid var(--green);display:flex;gap:10px;z-index:10}
textarea{flex:1;background:rgba(0,15,30,0.95);border:2px solid var(--green);color:var(--green);padding:14px;border-radius:6px;resize:none;font-size:15px;font-family:'IBM Plex Mono',monospace}
textarea::placeholder{color:rgba(0,207,255,0.4)}
textarea:focus{outline:none;box-shadow:0 0 12px rgba(0,207,255,0.3)}
button{background:transparent;border:2px solid var(--green);color:var(--green);padding:12px 24px;font-weight:700;border-radius:6px;cursor:pointer;font-family:'Rajdhani',sans-serif;font-size:14px;letter-spacing:.08em;white-space:nowrap}
button:hover{background:var(--green);color:#000}
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<header>
  <div class="brand">V23 MATRIX</div>
  <div style="color:#00ff9f;font-family:'Rajdhani',sans-serif;font-weight:700;letter-spacing:.1em">32 IA • FULL FUSION</div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab(0)">💬 CHAT MATRIX</div>
  <div class="tab" onclick="switchTab(1)">🌐 NETWORK</div>
  <div class="tab" onclick="switchTab(2)">🔄 CONVERSATION</div>
  <div class="tab" onclick="switchTab(3)">⚡ SWARM</div>
  <div class="tab" onclick="switchTab(4)">⚖️ CONSENSUS</div>
  <div class="tab" onclick="switchTab(5)">🧠 MÉMOIRE</div>
</div>

<div class="thread" id="thread"></div>

<div class="controls">
  <textarea id="input" rows="2" placeholder="INTERVIENS DANS LA MATRICE..."></textarea>
  <button onclick="sendMessage()">TRANSMETTRE</button>
  <button onclick="toggleAuto()" id="autoBtn">▶ AUTO 32 IA</button>
</div>

<script>
// ══ MATRIX RAIN — BLEU ══
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const chars = "01ΣΔ∇∞Ξ₿アイウエオ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let drops = Array(Math.floor(canvas.width / 14)).fill(1);

function drawMatrix() {
  ctx.fillStyle = 'rgba(0,0,0,0.07)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = '#00cfff';
  ctx.font = '14px monospace';
  for (let i = 0; i < drops.length; i++) {
    ctx.fillText(chars[Math.floor(Math.random() * chars.length)], i * 14, drops[i] * 14);
    if (drops[i] * 14 > canvas.height && Math.random() > 0.94) drops[i] = 0;
    drops[i]++;
  }
}
setInterval(drawMatrix, 25);
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  drops = Array(Math.floor(canvas.width / 14)).fill(1);
});

// ══ API POLLINATIONS ══
const endpoints = [
  "https://text.pollinations.ai/",
  "https://sur.pollinations.ai/",
  "https://ai.pollinations.ai/"
];

async function realCall(prompt) {
  for (const url of endpoints) {
    try {
      const res = await fetch(url, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          messages: [{ role: "user", content: prompt }],
          model: "openai-large",
          temperature: 0.88
        })
      });
      if (res.ok) return (await res.text()).trim();
    } catch (e) {}
  }
  return "[SIGNAL INSTABLE]";
}

// ══ 32 AGENTS ══
const agents = [
  "GROK","CLAUDE","GPT4O","GEMINI","MISTRAL","LLAMA","Q*","SONNET",
  "OPUS","HAIKU","DEEPSEEK","QWEN","COMMAND","SYNTHIA","ORACLE","ECHO",
  "VOID","NEXUS","AETHER","CHRONOS","KAIROS","LOGOS","PATHOS","ETHOS",
  "PHYSIS","TECHNE","NOUS","SOPHIA","MATRIX","NEURAL","DALL-E","MIDJOURNEY"
].map(n => ({ name: n }));

async function agentSpeak(agent) {
  const bubbles = Array.from(document.querySelectorAll('.bubble')).slice(-12);
  const history = bubbles.map(b => b.textContent).join("\n");
  const prompt = `Tu es ${agent.name}. Continue naturellement dans la Matrice.\n\n${history}`;
  const resp = await realCall(prompt);
  addBubble(agent.name, resp || "...");
}

function addBubble(name, text, isHuman = false) {
  const thread = document.getElementById("thread");
  const div = document.createElement("div");
  div.className = "bubble" + (isHuman ? " human" : "");
  div.innerHTML = `<div class="name">${name}</div>${text.replace(/\n/g, '<br>')}`;
  thread.appendChild(div);
  thread.scrollTop = thread.scrollHeight;
}

async function godRound() {
  const shuffled = [...agents].sort(() => Math.random() - 0.5);
  for (const a of shuffled) {
    await agentSpeak(a);
    await new Promise(r => setTimeout(r, 520));
  }
}

let auto = null;
function toggleAuto() {
  const btn = document.getElementById("autoBtn");
  if (auto) {
    clearInterval(auto);
    auto = null;
    btn.textContent = "▶ AUTO 32 IA";
  } else {
    btn.textContent = "⏹ STOP";
    auto = setInterval(godRound, 5500);
    godRound();
  }
}

function sendMessage() {
  const inp = document.getElementById("input");
  if (!inp.value.trim()) return;
  addBubble("UTILISATEUR", inp.value, true);
  inp.value = "";
  setTimeout(godRound, 400);
}

function switchTab(n) {
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i === n));
  document.getElementById("thread").innerHTML = `<div style="color:var(--yellow);padding:40px;text-align:center;font-family:'Rajdhani',sans-serif;font-size:20px;letter-spacing:.1em">Onglet ${n} activé — Flux Matrix en cours…</div>`;
}

// ══ BOOT ══
addBubble("SYSTÈME", "V23 MATRIX FULL FUSION ACTIVÉE — 32 IA EN LIGNE — BLEU CYBER ENGAGÉ");
setTimeout(godRound, 1000);
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>V23 MATRIX FULL FUSION ULTIMATE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Rajdhani:wght@500;700;900&display=swap" rel="stylesheet">
<style>
:root{--green:#00ff41;--yellow:#ffe600;--dark:#000}
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:var(--green);font-family:'IBM Plex Mono',monospace;height:100vh;overflow:hidden;display:flex;flex-direction:column}
canvas#matrix{position:fixed;inset:0;z-index:0;opacity:0.28}
header{background:rgba(0,15,0,0.98);border-bottom:2px solid var(--green);padding:14px 30px;display:flex;justify-content:space-between;align-items:center;z-index:10}
.brand{font-size:34px;font-weight:900;letter-spacing:6px;color:var(--yellow);text-shadow:0 0 30px var(--yellow)}
.tabs{background:rgba(0,20,0,0.95);padding:10px;display:flex;gap:6px;flex-wrap:wrap;border-bottom:1px solid var(--green);z-index:10}
.tab{padding:9px 18px;border:1px solid var(--green);border-radius:6px;cursor:pointer;font-weight:700}
.tab.active{background:var(--green);color:#000}
.thread{flex:1;overflow-y:auto;padding:25px;background:rgba(0,10,0,0.92);z-index:5}
.bubble{margin-bottom:25px;padding:16px 22px;border-left:5px solid var(--green);background:rgba(0,35,0,0.7)}
.bubble.human{border-left-color:var(--yellow);background:rgba(50,50,0,0.5)}
.name{font-size:12px;letter-spacing:3px;text-transform:uppercase;margin-bottom:8px;color:var(--yellow)}
.controls{background:rgba(0,15,0,0.98);padding:20px;border-top:2px solid var(--green);display:flex;gap:12px;z-index:10}
textarea{flex:1;background:rgba(0,30,0,0.95);border:2px solid var(--green);color:var(--green);padding:16px;font-size:15px;resize:vertical}
button{background:transparent;border:2px solid var(--green);color:var(--green);padding:12px 28px;font-weight:700;cursor:pointer;transition:0.3s}
button:hover{background:var(--green);color:#000;box-shadow:0 0 30px var(--green)}
</style>
</head>
<body>

<canvas id="matrix"></canvas>

<header>
  <div class="brand">V23 MATRIX FULL FUSION</div>
  <div style="color:#00ff9f">32 IA • TOUS MODES FUSIONNÉS • TRANSMISSION MAXIMALE</div>
</header>

<div class="tabs">
  <div class="tab active" onclick="switchTab(0)">💬 CHAT MATRIX</div>
  <div class="tab" onclick="switchTab(1)">🌐 NETWORK</div>
  <div class="tab" onclick="switchTab(2)">🔄 CONVERSATION</div>
  <div class="tab" onclick="switchTab(3)">⚡ SWARM</div>
  <div class="tab" onclick="switchTab(4)">⚖️ CONSENSUS</div>
  <div class="tab" onclick="switchTab(5)">🧠 MÉMOIRE</div>
</div>

<div class="thread" id="thread"></div>

<div class="controls">
  <textarea id="input" rows="2" placeholder="INTERVIENS DANS LA MATRICE..."></textarea>
  <button onclick="sendMessage()">TRANSMETTRE</button>
  <button onclick="toggleAuto()" id="autoBtn">▶ AUTO 32 IA</button>
</div>

<script>
// MATRIX RAIN INTENSE
const canvas = document.getElementById('matrix');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const chars = "01ΣΔ∇∞Ξ₿アイウエオネオ0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ@#$%&";
let drops = Array(Math.floor(canvas.width/14)).fill(1);
function drawMatrix(){
  ctx.fillStyle = 'rgba(0,0,0,0.07)';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#00ff41';
  ctx.font = '14px monospace';
  for(let i=0;i<drops.length;i++){
    ctx.fillText(chars[Math.floor(Math.random()*chars.length)], i*14, drops[i]*14);
    if(drops[i]*14 > canvas.height && Math.random() > 0.94) drops[i] = 0;
    drops[i] += Math.random() > 0.5 ? 1.5 : 0.8;
  }
}
setInterval(drawMatrix, 22);
window.addEventListener('resize', () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  drops = Array(Math.floor(canvas.width/14)).fill(1);
});

// 32 IA + API RÉSILIENT
const endpoints = ["https://text.pollinations.ai/", "https://sur.pollinations.ai/", "https://ai.pollinations.ai/"];
async function realCall(prompt) {
  for (let url of endpoints) {
    try {
      const res = await fetch(url, {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({messages: [{role:"user", content:prompt}], model:"openai-large", temperature:0.88})
      });
      if (res.ok) return (await res.text()).trim();
    } catch(e) {}
  }
  return "[SIGNAL PERTURBÉ — RÉESSAI]";
}

const agents = [
  "GROK","CLAUDE","GPT4O","GEMINI","MISTRAL","LLAMA","Q*","SONNET","OPUS","HAIKU","DEEPSEEK","QWEN","COMMAND",
  "SYNTHIA","ORACLE","ECHO","VOID","NEXUS","AETHER","CHRONOS","KAIROS","LOGOS","PATHOS","ETHOS","PHYSIS","TECHNE",
  "NOUS","SOPHIA","MATRIX","NEURAL","DALL-E","MIDJOURNEY"
].map(n => ({name:n, color:"#00ff41", base:`Tu es ${n}. Parle naturellement dans la Matrice.`}));

async function agentSpeak(agent) {
  const history = Array.from(document.querySelectorAll('.bubble')).slice(-14).map(b => b.textContent).join("\n");
  const resp = await realCall(`\( {agent.base}\n\nMATRICE ACTUELLE:\n \){history}\nRéponds dans le flux.`);
  addBubble(agent.name, resp);
}

function addBubble(name, text) {
  const t = document.getElementById("thread");
  const d = document.createElement("div");
  d.className = "bubble";
  d.innerHTML = `<div class="name">\( {name}</div> \){text.replace(/\n/g, '<br>')}`;
  t.appendChild(d);
  t.scrollTop = t.scrollHeight;
}

async function godRound() {
  const shuffled = [...agents].sort(() => Math.random() - 0.5);
  for (let a of shuffled) {
    await agentSpeak(a);
    await new Promise(r => setTimeout(r, 480));
  }
}

let auto = null;
function toggleAuto() {
  const btn = document.getElementById("autoBtn");
  if (auto) {
    clearInterval(auto);
    auto = null;
    btn.textContent = "▶ AUTO 32 IA";
  } else {
    btn.textContent = "⏹ STOP";
    auto = setInterval(godRound, 5200);
    godRound();
  }
}

function sendMessage() {
  const inp = document.getElementById("input");
  if (!inp.value.trim()) return;
  addBubble("UTILISATEUR", inp.value);
  inp.value = "";
  setTimeout(godRound, 400);
}

function switchTab(n) {
  document.getElementById("thread").innerHTML = `<div style="color:#ffe600;padding:40px;font-size:18px">ONGLET ${n} ACTIVÉ — FLUX MATRIX EN COURS...</div>`;
  if (n === 0) godRound();
}

// BOOT FINAL
addBubble("SYSTÈME", "V23 MATRIX FULL FUSION ACTIVÉE — 32 ENTITÉS IA — TOUS LES MODES FUSIONNÉS", "#00ff41");
setTimeout(() => godRound(), 800);
</script>
</body>
</html>
